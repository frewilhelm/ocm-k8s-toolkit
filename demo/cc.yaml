components:
  - name: test-registry.com/test-org/test-component
    version: "1.0.0"
    provider:
      name: test-org
    resources:
      - name: helm-resource
        type: helmChart
        version: "1.0.0"
        access:
          type: ociArtifact
          imageReference: ghcr.io/stefanprodan/charts/podinfo:6.7.1
      - name: helm-localization-config
        type: ocm.localization
        input:
          type: file
          path: localization-config.yaml
          mediaType: text/plain
      - name: image
        type: ociArtifact
        version: "1.0.0"
        options:
          skipDigestGeneration: true
        access:
          type: ociArtifact
          imageReference: localhost:31000/stefanprodan/podinfo:6.7.1
