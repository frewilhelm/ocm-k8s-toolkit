---
# External port to the image registry. Can be reached from the host with 'localhost:31000'
apiVersion: v1
kind: Service
metadata:
  name: registry-external
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 5001
      targetPort: 5000
      nodePort: 31000
  selector:
    app: registry
---
# Internal port to the image registry. Can be reached from inside the cluster with 'http://registry-internal.default.svc.cluster.local:5000/'
apiVersion: v1
kind: Service
metadata:
  name: registry-internal
  namespace: default
spec:
  type: ClusterIP
  ports:
    - port: 5001
      targetPort: 5000
  selector:
    app: registry