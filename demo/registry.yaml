apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
      - name: registry
        image: ghcr.io/project-zot/zot:latest
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: config-volume
          mountPath: /etc/zot/config.json
          subPath: config.json
        - name: storage
          mountPath: /tmp/zot
      - name: sidecar
        image: busybox:latest
        command: ["/bin/sh", "-c", "sleep infinity"]
        volumeMounts:
        - name: storage
          mountPath: /tmp/zot
      volumes:
      - name: config-volume
        configMap:
          name: config
      - name: storage
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  config.json: |
    {
      "storage": {
        "rootDirectory": "/tmp/zot",
        "dedupe": true,
        "gc": true,
        "gcDelay": "1h",
        "gcInterval": "24h"
      },
      "http": {
        "address":"0.0.0.0",
        "port": "5000",
        "compat": "docker2s2"
      }
    }
---
