apiVersion: delivery.ocm.software/v1alpha1
kind: OCMRepository
metadata:
  name: helm-ocmrepository
spec:
  repositorySpec:
    baseUrl: "http://registry-internal.default.svc.cluster.local:5001"
    type: OCIRegistry
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Component
metadata:
  name: helm-component
spec:
  component: test-registry.com/test-org/test-component
  repositoryRef:
    name: helm-ocmrepository
    namespace: default
  semver: v1.0.0
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: helm-resource
spec:
  componentRef:
    name: helm-component
  resource:
    byReference:
      resource:
        name: helm-resource
  interval: 10m
---
apiVersion: delivery.ocm.software/v1alpha1
kind: Resource
metadata:
  name: helm-localization-resource
spec:
  componentRef:
    name: helm-component
  interval: 10m
  resource:
    byReference:
      resource:
        name: helm-localization-config
---
apiVersion: delivery.ocm.software/v1alpha1
kind: LocalizedResource
metadata:
  name: helm-localized-resource
spec:
  interval: 10m
  target:
    kind: Resource
    name: helm-resource
  config:
    kind: Resource
    name: helm-localization-resource
